<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Live scored run windows with weather, air quality & pollen — for wherever you are." />

    <!-- Title (shows in iMessage previews, browser tabs, etc.) -->
    <title>tempRUNture</title>

    <!-- PWA / Home Screen -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="tempRUNture" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- iOS adaptive icon: dark + light -->
    <link rel="apple-touch-icon" media="(prefers-color-scheme: dark)" href="/favicon.svg" />
    <link rel="apple-touch-icon" media="(prefers-color-scheme: light)" href="/icon-light.svg" />

    <!-- Theme color adapts to light/dark -->
    <meta name="theme-color" content="#050c08" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4efe6" media="(prefers-color-scheme: light)" />

    <!-- Open Graph (iMessage / social link preview) -->
    <meta property="og:title" content="tempRUNture" />
    <meta property="og:description" content="Live scored run windows with weather, air quality & pollen." />
    <meta property="og:url" content="https://temprunture.com" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
